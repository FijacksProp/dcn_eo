services:
  - type: web
    name: dcn-eo-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: "False"
      - key: USE_LOCAL_SQLITE
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: TIME_ZONE
        value: Africa/Lagos
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://.*\.onrender\.com$
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  - type: static
    name: dcn-eo-web
    rootDir: .
    buildCommand: corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm run build:frontend
    staticPublishPath: dist/public
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
